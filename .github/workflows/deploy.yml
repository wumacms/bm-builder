# 将静态内容部署到 GitHub Pages 的简单工作流
name: 部署静态内容到 GitHub Pages

on:
  # 仅在推送到主分支（main）时触发
  push:
    branches: ["main"]

  # 允许在 Actions 选项卡中手动运行此工作流
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发部署，跳过正在运行的部署和最新队列之间的运行。
# 但是，不要取消正在进行的运行，因为我们希望允许这些生产部署完成。
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 单个部署作业
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码 (Checkout)
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install

      - name: 执行项目构建
        run: pnpm run build

      - name: 配置 GitHub Pages 环境
        uses: actions/configure-pages@v5

      - name: 上传构建产物 (Upload artifact)
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传构建后的 dist 目录
          path: './dist'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
