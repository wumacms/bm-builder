<!-- 新闻动态 -->
<section id="{{id}}" class="py-20 lg:py-32">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex flex-col md:flex-row md:items-end md:justify-between mb-12">
            <div>
                <div
                    class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-4">
                    <i class="{{badge.icon}} mr-2"></i>
                    {{badge.text}}
                </div>
                <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white">
                    {{title}}
                </h2>
            </div>
            <a href="{{viewAll.link}}"
                class="mt-4 md:mt-0 inline-flex items-center text-primary-600 dark:text-primary-400 font-medium hover:text-primary-700">
                {{viewAll.text}} <i class="fas fa-arrow-right ml-2"></i>
            </a>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            {{#each items}}
            <!-- 新闻卡片 -->
            <article
                class="group bg-white dark:bg-gray-800 rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300">
                <div class="aspect-video overflow-hidden">
                    <img src="{{image}}"
                        alt="News"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="p-6">
                    <div
                        class="flex justify-between items-center space-x-4 text-sm text-gray-500 dark:text-gray-400 mb-3">
                        <span><i class="far fa-folder mr-1"></i> {{category}}</span>
                        <span><i class="far fa-calendar mr-1"></i> {{date}}</span>
                    </div>
                    <h3
                        class="text-lg font-bold text-gray-900 dark:text-white mb-2 group-hover:text-primary-600 dark:group-hover:text-primary-400 transition-colors">
                        {{title}}
                    </h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm line-clamp-2">
                        {{summary}}
                    </p>
                </div>
            </article>
            {{/each}}
        </div>
    </div>
</section>
