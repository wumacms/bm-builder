<!-- 关于我们 -->
<section id="{{id}}" class="py-20 lg:py-32 relative overflow-hidden">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid lg:grid-cols-2 gap-12 items-center">
            <!-- 左侧图片 -->
            <div class="relative">
                <img src="{{image.src}}"
                    alt="{{image.alt}}" class="rounded-3xl shadow-2xl">
            </div>

            <!-- 右侧内容 -->
            <div>
                <div
                    class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-6">
                    <i class="{{badge.icon}} mr-2"></i>
                    {{badge.text}}
                </div>
                <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-6">
                    {{title}}
                </h2>
                <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
                    {{description}}
                </p>

                <div class="space-y-6">
                    {{#each items}}
                    <div class="flex items-start space-x-4">
                        <div
                            class="w-12 h-12 {{iconBg}} rounded-2xl flex items-center justify-center flex-shrink-0">
                            <i class="{{icon}} {{iconColor}} text-xl"></i>
                        </div>
                        <div>
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-1">{{title}}</h3>
                            <p class="text-gray-600 dark:text-gray-400">{{description}}</p>
                        </div>
                    </div>
                    {{/each}}
                </div>
            </div>
        </div>
    </div>
</section>
