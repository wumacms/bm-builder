<!-- 服务范围 -->
<section id="{{id}}" class="py-20 lg:py-32 bg-white dark:bg-gray-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <div
                class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-4">
                <i class="{{badge.icon}} mr-2"></i>
                {{badge.text}}
            </div>
            <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-4">
                {{title}}
            </h2>
            <p class="text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
                {{description}}
            </p>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
            {{#each items}}
            <!-- 服务项 -->
            <div
                class="group p-6 bg-gray-50 dark:bg-gray-700/50 rounded-2xl hover:bg-primary-50 dark:hover:bg-primary-900/30 transition-all duration-300 cursor-pointer">
                <div
                    class="w-14 h-14 bg-white dark:bg-gray-800 rounded-2xl shadow-lg flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
                    <i class="{{icon}} text-2xl {{iconClass}}"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">{{title}}</h3>
                <p class="text-sm text-gray-600 dark:text-gray-400">{{description}}</p>
            </div>
            {{/each}}
        </div>
    </div>
</section>
