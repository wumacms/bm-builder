<!-- 产品列表 -->
<section id="{{id}}" class="py-20 lg:py-32 bg-gray-50 dark:bg-gray-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <div
                class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-4">
                <i class="{{badge.icon}} mr-2"></i>
                {{badge.text}}
            </div>
            <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-4">
                {{title}}
            </h2>
            <p class="text-lg text-gray-600 dark:text-gray-400 max-w-2xl mx-auto">
                {{description}}
            </p>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
            {{#each items}}
            <!-- 产品卡片 -->
            <div {{#if itemId}}id="{{itemId}}"{{/if}}
                class="group bg-white dark:bg-gray-800 rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all duration-300 hover:-translate-y-2">
                <div class="aspect-video overflow-hidden">
                    <img src="{{image}}"
                        alt="{{title}}"
                        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                </div>
                <div class="p-6">
                    <div class="flex items-center justify-between mb-3">
                        <span
                            class="px-3 py-1 {{tagClass}} text-xs rounded-full font-medium">{{tag}}</span>
                        <span class="text-sm text-gray-400">{{version}}</span>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2">{{title}}</h3>
                    <p class="text-gray-600 dark:text-gray-400 text-sm mb-4">{{description}}</p>
                    <a href="{{link}}"
                        class="inline-flex items-center text-primary-600 dark:text-primary-400 font-medium text-sm hover:text-primary-700">
                        了解详情 <i class="fas fa-arrow-right ml-2"></i>
                    </a>
                </div>
            </div>
            {{/each}}
        </div>
    </div>
</section>
