<!-- 联系我们 -->
<section id="{{id}}" class="py-20 lg:py-32 bg-gray-50 dark:bg-gray-800/50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid lg:grid-cols-2 gap-12">
            <!-- 左侧信息 -->
            <div>
                <div
                    class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-6">
                    <i class="{{badge.icon}} mr-2"></i>
                    {{badge.text}}
                </div>
                <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-6">
                    {{title}}
                </h2>
                <p class="text-lg text-gray-600 dark:text-gray-400 mb-8">
                    {{description}}
                </p>

                <!-- 联系方式 -->
                <div class="space-y-6">
                    {{#each contactDetails}}
                    <div class="flex items-center">
                        <div
                            class="w-12 h-12 bg-primary-100 dark:bg-primary-900/50 rounded-xl flex items-center justify-center mr-4">
                            <i class="{{icon}} text-primary-500"></i>
                        </div>
                        <div>
                            <div class="text-sm text-gray-500 dark:text-gray-400">{{label}}</div>
                            <div class="text-lg font-semibold text-gray-900 dark:text-white">{{value}}</div>
                        </div>
                    </div>
                    {{/each}}
                </div>

                <!-- 社交媒体 -->
                <div class="mt-8 pt-8 border-t border-gray-200 dark:border-gray-700">
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-4">{{socialMedia.label}}</div>
                    <div class="flex space-x-4">
                        {{#each socialMedia.links}}
                        <a href="{{link}}"
                            class="w-10 h-10 bg-gray-100 dark:bg-gray-800 rounded-xl flex items-center justify-center text-gray-600 dark:text-gray-400 hover:bg-primary-100 dark:hover:bg-primary-900/50 hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
                            <i class="{{icon}}"></i>
                        </a>
                        {{/each}}
                    </div>
                </div>
            </div>

            <!-- 右侧表单 -->
            <div
                class="bg-white dark:bg-gray-800 rounded-3xl p-8 lg:p-10 shadow-xl border border-gray-100 dark:border-gray-700">
                <h3 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">{{form.title}}</h3>
                <form id="contactForm" class="space-y-5">
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{form.fields.name.label}}</label>
                            <input type="text"
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-gray-900 dark:text-white placeholder-gray-400"
                                placeholder="{{form.fields.name.placeholder}}">
                        </div>
                        <div>
                            <label
                                class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{form.fields.phone.label}}</label>
                            <input type="tel"
                                class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-gray-900 dark:text-white placeholder-gray-400"
                                placeholder="{{form.fields.phone.placeholder}}">
                        </div>
                    </div>

                    <div>
                        <label
                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{form.fields.organization.label}}</label>
                        <input type="text"
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-gray-900 dark:text-white placeholder-gray-400"
                            placeholder="{{form.fields.organization.placeholder}}">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">{{form.fields.message.label}}</label>
                        <textarea rows="4"
                            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all resize-none text-gray-900 dark:text-white placeholder-gray-400"
                            placeholder="{{form.fields.message.placeholder}}"></textarea>
                    </div>

                    <button type="submit"
                        class="w-full py-4 bg-gradient-to-r from-primary-500 to-primary-600 text-white rounded-xl font-semibold hover:from-primary-600 hover:to-primary-700 transition-all duration-200 shadow-lg shadow-primary-500/30 hover:shadow-xl">
                        <i class="{{form.buttonIcon}} mr-2"></i>
                        {{form.buttonText}}
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
