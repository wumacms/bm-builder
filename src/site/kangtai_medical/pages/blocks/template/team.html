<!-- 核心团队 -->
<section id="{{id}}" class="py-20 lg:py-32">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <div
                class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-4">
                <i class="{{badge.icon}} mr-2"></i>
                {{badge.text}}
            </div>
            <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-4">
                {{title}}
            </h2>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-8">
            {{#each members}}
            <!-- 团队成员 -->
            <div class="group text-center">
                <div class="relative mb-6 overflow-hidden rounded-3xl">
                    <img src="{{image}}"
                        alt="{{name}}"
                        class="w-full aspect-square object-cover group-hover:scale-110 transition-transform duration-500">
                    <div
                        class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-6">
                        <div class="flex space-x-3">
                            {{#each social}}
                            <a href="{{link}}"
                                class="w-10 h-10 bg-white/20 backdrop-blur rounded-full flex items-center justify-center text-white hover:bg-white/40 transition-colors">
                                <i class="{{icon}}"></i>
                            </a>
                            {{/each}}
                        </div>
                    </div>
                </div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">{{name}}</h3>
                <p class="{{roleClass}} text-sm mb-2">{{role}}</p>
                <p class="text-sm text-gray-500 dark:text-gray-400">{{experience}}</p>
            </div>
            {{/each}}
        </div>
    </div>
</section>
