<!-- 企业文化 -->
<section id="{{id}}" class="py-20 lg:py-32">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <div
                class="inline-flex items-center px-4 py-2 bg-primary-100 dark:bg-primary-900/50 text-primary-700 dark:text-primary-300 rounded-full text-sm font-medium mb-4">
                <i class="{{badge.icon}} mr-2"></i>
                {{badge.text}}
            </div>
            <h2 class="text-3xl lg:text-5xl font-bold text-gray-900 dark:text-white mb-4">
                {{title}}
            </h2>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            {{#each items}}
            <div
                class="text-center p-8 bg-gradient-to-br {{gradient}} rounded-3xl">
                <div
                    class="w-16 h-16 mx-auto bg-white dark:bg-gray-800 rounded-2xl shadow-lg flex items-center justify-center mb-6">
                    <i class="{{icon}} text-2xl {{iconColor}}"></i>
                </div>
                <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-3">{{title}}</h3>
                <p class="text-gray-600 dark:text-gray-400">{{description}}</p>
            </div>
            {{/each}}
        </div>
    </div>
</section>
